<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .header { background: #1B2A4A; color: white; padding: 16px; text-align: center; }
    .header h1 { margin: 0; font-size: 20px; }
    .header h1 span { color: #C4A962; }
    .header p { margin: 4px 0 0; font-size: 11px; color: #C4A962; }
    .content { padding: 16px; }
    .status { text-align: center; padding: 20px; color: #666; font-size: 13px; }
    .status.error { color: #dc2626; }
    .status.success { color: #16a34a; }
    .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; margin-top: 12px; }
    .btn-primary { background: #1B2A4A; color: white; }
    .btn-primary:hover { background: #2a3f6a; }
    .btn-gold { background: #C4A962; color: #1B2A4A; }
    .preview { background: #f8f8f8; border-radius: 8px; padding: 12px; margin-top: 12px; font-size: 12px; }
    .preview h3 { margin: 0 0 8px; font-size: 14px; color: #1B2A4A; }
    .preview p { margin: 2px 0; color: #555; }
    .preview .price { color: #1B2A4A; font-weight: bold; font-size: 16px; }
    .imgs { display: flex; gap: 4px; margin-top: 8px; overflow-x: auto; }
    .imgs img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Alta<span>prop</span></h1>
    <p>Importador de Propiedades</p>
  </div>
  <div class="content">
    <div id="status" class="status">Verificando página...</div>
    <div id="preview" style="display:none"></div>
    <div id="actions" style="display:none">
      <button id="importBtn" class="btn btn-gold">Importar a Altaprop</button>
      <button id="previewBtn" class="btn btn-primary" style="margin-top:8px">Ver en Altaprop</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
